<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="dashboard" id="app">
        <h1 class="dashboard-title">
            <i class="fas fa-users-cog"></i> Employee Management
        </h1>

        <div class="tab-navigation">
            <button class="tab-btn active" data-tab="add">
                <i class="fas fa-user-plus"></i> Add Employee
            </button>
            <button class="tab-btn" data-tab="view">
                <i class="fas fa-list"></i> View Employees
            </button>
        </div>

        <div class="tab-content active" id="tab-add">
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-user-tie"></i> Employee Information</h2>
                    <span class="text-muted" id="formMode">Add new</span>
                </div>
                <form id="employeeForm" class="employee-form">
                    <div class="form-group">
                        <label for="empName">Full name <span class="required">*</span></label>
                        <input type="text" id="empName" placeholder="e.g. Sidra Liaqat" required />
                     
                    </div>
                    <div class="form-group">
                        <label for="empEmail">Email <span class="required">*</span></label>
                        <input type="email" id="empEmail" placeholder="sidray@gmail.com" required />
      
                    </div>
                    <div class="form-group">
                        <label for="empDept">Department <span class="required">*</span></label>
                        <select id="empDept" required>
                            <option value="">Select Department</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Medical">Medical</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Sales">Sales</option>
                            <option value="Human Resources">Human Resources</option>
                            <option value="Finance">Finance</option>
                            <option value="IT">IT</option>
                            <option value="Operations">Operations</option>
                            <option value="Customer Support">Customer Support</option>
                            <option value="Research & Development">Research & Development</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            <i class="fas fa-save"></i> Add Employee
                        </button>
                        <button type="button" class="btn btn-outline" id="cancelEditBtn" style="display:none;">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                    </div>
                </form>
                <div id="formError" class="form-error" style="display:none;"></div>
                <div id="formSuccess" class="form-success" style="display:none;">
                    <i class="fas fa-check-circle"></i> <span id="successMessage">Employee added successfully!</span>
                </div>
            </div>
        </div>

        <div class="tab-content" id="tab-view">
            <div class="card">
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-item">
                        <i class="fas fa-users"></i>
                        <div>
                            <span class="label">Total Employees</span>
                            <span class="value" id="totalEmployees">0</span>
                        </div>
                    </div>
                   
                    <div class="stat-item">
                        <i class="fas fa-building"></i>
                        <div>
                            <span class="label">Departments</span>
                            <span class="value" id="deptCount">0</span>
                        </div>
                    </div>
                </div>

                <div class="toolbar">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search by name or department..." />
                        <button id="clearSearchBtn" class="btn-clear"><i class="fas fa-times"></i></button>
                    </div>
                    <div>
                        <span class="text-muted" id="resultCount">0 employees</span>
                    </div>
                </div>

                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Department</th>
                                <th style="text-align:center;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="employeeTableBody"></tbody>
                    </table>
                </div>
                <div id="emptyMessage" class="empty-state" style="display:none;">
                    <i class="fas fa-user-slash"></i>
                    <p>No employees found. Go to <strong>Add Employee</strong> tab to add your first record!</p>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
